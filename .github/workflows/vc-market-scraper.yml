name: VC Market Scraper

on:
  schedule:
    - cron: '00 20 * * *'  # 10h BRT (UTC-3)
  workflow_dispatch:       # permite rodar manualmente

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger scraper
        run: |
          response=$(curl -s -o /tmp/response.json -w "%{http_code}" --max-time 130 \
            "${{ secrets.APP_URL }}/api/vc-market/cron")
          echo "HTTP Status: $response"
          echo "Response body:"
          cat /tmp/response.json
          if [ "$response" != "200" ]; then
            echo "Scraper failed with status $response"
            exit 1
          fi
