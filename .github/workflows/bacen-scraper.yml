name: BACEN Daily Regulatory Scraper

on:
  schedule:
    # Roda todo dia as 16h00 horario de Brasilia (UTC-3) = 19h00 UTC
    - cron: '00 19 * * 1-5'
  workflow_dispatch: # Permite rodar manualmente pelo GitHub

jobs:
  scrape:
    runs-on: ubuntu-latest

    steps:
      - name: Run BACEN scraper
        id: scraper
        run: |
          echo "Starting BACEN scraper at $(date -u)"
          STATUS=$(curl -s -o /tmp/bacen_response.txt -w "%{http_code}" \
            --max-time 300 \
            -L \
            -H "Cache-Control: no-cache" \
            -H "Pragma: no-cache" \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            -X GET "${{ secrets.APP_URL }}/api/bacen/scraper")

          echo "HTTP Status: $STATUS"
          BODY=$(cat /tmp/bacen_response.txt)
          echo "Response: $BODY"

          if [ "$STATUS" != "200" ]; then
            echo "scraper_status=failed" >> $GITHUB_OUTPUT
            echo "scraper_body=$BODY" >> $GITHUB_OUTPUT
            echo "Scraper failed with status $STATUS"
            exit 1
          fi

          # Parse result fields
          INSERTED=$(echo "$BODY" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('inserted',0))" 2>/dev/null || echo "0")
          SKIPPED=$(echo "$BODY" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('skipped',0))" 2>/dev/null || echo "0")
          RELEVANT=$(echo "$BODY" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('relevant',0))" 2>/dev/null || echo "0")
          TOTAL=$(echo "$BODY" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('total_fetched',0))" 2>/dev/null || echo "0")
          REGS=$(echo "$BODY" | python3 -c "import sys,json; d=json.load(sys.stdin); print(', '.join(d.get('regulations',[])))" 2>/dev/null || echo "")

          echo "Total fetched from RSS: $TOTAL"
          echo "Relevant (AI filtered): $RELEVANT"
          echo "Inserted into DB: $INSERTED"
          echo "Skipped (duplicates): $SKIPPED"
          echo "Regulation IDs: $REGS"

          echo "scraper_status=success" >> $GITHUB_OUTPUT
          echo "inserted=$INSERTED" >> $GITHUB_OUTPUT
          echo "skipped=$SKIPPED" >> $GITHUB_OUTPUT
          echo "relevant=$RELEVANT" >> $GITHUB_OUTPUT
          echo "total=$TOTAL" >> $GITHUB_OUTPUT
          echo "regulations=$REGS" >> $GITHUB_OUTPUT

      - name: Send email notification
        if: always()
        env:
          SENDGRID_API_KEY: ${{ secrets.SENDGRID_API_KEY }}
          NOTIFY_EMAIL: ${{ secrets.BACEN_NOTIFY_EMAIL }}
          STATUS: ${{ steps.scraper.outputs.scraper_status }}
          INSERTED: ${{ steps.scraper.outputs.inserted }}
          SKIPPED: ${{ steps.scraper.outputs.skipped }}
          RELEVANT: ${{ steps.scraper.outputs.relevant }}
          TOTAL: ${{ steps.scraper.outputs.total }}
          REGULATIONS: ${{ steps.scraper.outputs.regulations }}
        run: |
          if [ -z "$SENDGRID_API_KEY" ] || [ -z "$NOTIFY_EMAIL" ]; then
            echo "Email secrets not configured, skipping notification."
            exit 0
          fi

          RUN_DATE=$(date -u +"%Y-%m-%d %H:%M UTC")
          JOB_STATUS=${STATUS:-"unknown"}

          if [ "$JOB_STATUS" = "success" ]; then
            SUBJECT="[BACEN Scraper] ${INSERTED} norma(s) inserida(s) - ${RUN_DATE}"
            COLOR="#16a34a"
            ICON="OK"
          else
            SUBJECT="[BACEN Scraper] FALHA na execucao - ${RUN_DATE}"
            COLOR="#dc2626"
            ICON="ERRO"
          fi

          BODY_HTML="<h2 style='color:${COLOR}'>[${ICON}] BACEN Regulatory Scraper</h2>\
          <p><strong>Data:</strong> ${RUN_DATE}</p>\
          <p><strong>Status:</strong> ${JOB_STATUS}</p>\
          <hr/>\
          <p><strong>Total buscado no RSS:</strong> ${TOTAL}</p>\
          <p><strong>Relevantes (filtro AI):</strong> ${RELEVANT}</p>\
          <p><strong>Inseridos no banco:</strong> ${INSERTED}</p>\
          <p><strong>Ignorados (duplicatas):</strong> ${SKIPPED}</p>\
          <hr/>\
          <p><strong>IDs das normas inseridas:</strong><br/>${REGULATIONS}</p>\
          <hr/>\
          <p style='font-size:12px;color:#6b7280'>PRLX App - Regulatory Timeline Scraper | GitHub Actions</p>"

          python3 - <<EOF
          import os, json, urllib.request
          key = os.environ['SENDGRID_API_KEY']
          to  = os.environ['NOTIFY_EMAIL']
          payload = json.dumps({
            "personalizations": [{"to": [{"email": to}]}],
            "from": {"email": "noreply@prlx.app", "name": "PRLX Regulatory Bot"},
            "subject": os.environ['SUBJECT'],
            "content": [{"type": "text/html", "value": os.environ['BODY_HTML']}]
          }).encode()
          req = urllib.request.Request(
            "https://api.sendgrid.com/v3/mail/send",
            data=payload,
            headers={"Authorization": f"Bearer {key}", "Content-Type": "application/json"}
          )
          try:
            urllib.request.urlopen(req)
            print("Email sent successfully")
          except Exception as e:
            print(f"Email failed: {e}")
          EOF
        env:
          SUBJECT: ${{ steps.scraper.outputs.scraper_status == 'success' && format('[BACEN Scraper] {0} norma(s) inserida(s)', steps.scraper.outputs.inserted) || '[BACEN Scraper] FALHA na execucao' }}
          BODY_HTML: "<placeholder>"
