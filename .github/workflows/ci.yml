name: CI
on:
  push:
    branches: [main]
  pull_request:
jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v7
        with:
          node-version-file: .nvmrc
          cache: npm
      - run: npm ci
      - name: Typecheck
        run: npx tsc --noEmit
      - name: Tests
        run: npx vitest run
      # Gate on CRITICAL only — the outstanding high-severity items (xlsx/next) are tracked
      # separately and shouldn't red-wall every PR until that remediation lands.
      - name: Security audit (production deps)
        run: npm audit --omit=dev --audit-level=critical
