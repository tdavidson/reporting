[build]
  command = "rm -rf .next/cache && npm run build"
  publish = ".next"

[[plugins]]
  package = "@netlify/plugin-nextjs"

# Ensure _next/static assets are served with correct cache headers
# and NOT routed through server functions.
[[headers]]
  for = "/_next/static/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Prevent Netlify edge from caching auth and demo pages.
# These depend on real-time auth state and must never be served stale.
[[headers]]
  for = "/auth/*"
  [headers.values]
    Cache-Control = "no-store, no-cache, must-revalidate"
    Netlify-CDN-Cache-Control = "no-store"

[[headers]]
  for = "/demo"
  [headers.values]
    Cache-Control = "no-store, no-cache, must-revalidate"
    Netlify-CDN-Cache-Control = "no-store"

[[headers]]
  for = "/api/auth/*"
  [headers.values]
    Cache-Control = "no-store, no-cache, must-revalidate"
    Netlify-CDN-Cache-Control = "no-store"

[[headers]]
  for = "/api/demo/*"
  [headers.values]
    Cache-Control = "no-store, no-cache, must-revalidate"
    Netlify-CDN-Cache-Control = "no-store"
